name: laqta

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: laqta
      POSTGRES_PASSWORD: laqta
      POSTGRES_DB: laqta
    ports:
      - "5432:5432"
    volumes:
      - ./.data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laqta"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - ./.data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  typesense:
    image: typesense/typesense:27.1
    command:
      - "--data-dir=/data"
      - "--api-key=laqta-dev-typesense-key"
      - "--enable-cors"
    ports:
      - "8108:8108"
    volumes:
      - ./.data/typesense:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8108/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # MinIO stands in for Cloudflare R2 locally (S3-compatible). In production R2
  # is external and these are not deployed.
  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: laqta
      MINIO_ROOT_PASSWORD: laqtasecret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./.data/minio:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: create the bucket and make renditions/* publicly readable.
  # Mirrors production, where the R2 bucket + public access are provisioned
  # out of band and the app only performs object I/O.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 laqta laqtasecret &&
      mc mb --ignore-existing local/laqta &&
      mc anonymous set download local/laqta/renditions &&
      echo 'bucket ready'
      "
    restart: "no"
